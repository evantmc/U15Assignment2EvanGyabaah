<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Space — Configurator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
    }

    /* ── Header ── */
    header {
      display: grid;
      grid-template-columns: 1fr 200px;
      height: 70px;
      border: 2px solid black;
    }

    .header-left {
      display: flex;
      align-items: center;
      padding-left: 16px;
      position: relative;
    }

    .nav-arrows {
      display: flex;
      gap: 6px;
      z-index: 1;
    }

    .nav-arrows button {
      width: 32px;
      height: 32px;
      background-color: white;
      border: 2px solid black;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .nav-arrows button:hover {
      background-color: #ffff00;
    }

    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 42px;
      font-weight: bold;
    }

    .logo {
      background-color: #8c8c8c;
      border-left: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Nav ── */
    nav {
      height: 70px;
      border-left: 2px solid black;
      border-right: 2px solid black;
      border-bottom: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      font-size: 18px;
      font-weight: bold;
      background-color: #f5f5f5;
    }

    nav a {
      color: black;
      text-decoration: none;
      padding: 6px 16px;
      border: 2px solid transparent;
    }

    nav a:hover {
      color: black;
      background-color: #ffff00;
      border: 2px solid black;
    }

    nav a.active {
      color: black;
      background-color: #ffff00;
      border: 2px solid black;
    }

    /* ── Page heading ── */
    .page-heading {
      border-left: 2px solid black;
      border-right: 2px solid black;
      border-bottom: 2px solid black;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-heading h1 {
      font-size: 28px;
      font-weight: bold;
      margin: 0;
    }

    .page-heading p {
      font-size: 14px;
      color: #555;
      margin: 0;
    }

    /* ── Configurator section ── */
    .configurator-section {
      border-left: 2px solid black;
      border-right: 2px solid black;
      border-bottom: 2px solid black;
      padding: 40px;
    }

    /* ── Car selector ── */
    .car-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .car-selector label {
      font-size: 15px;
      font-weight: bold;
    }

    .car-selector select {
      height: 38px;
      border: 2px solid black;
      padding: 0 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      background-color: white;
      cursor: pointer;
      min-width: 200px;
    }

    /* ── Car preview ── */
    .car-preview {
      width: 100%;
      height: 340px;
      border: 2px solid black;
      background-color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      overflow: hidden;
      position: relative;
    }

    .car-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .car-preview .preview-label {
      position: absolute;
      top: 14px;
      left: 14px;
      background-color: black;
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .placeholder-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .placeholder-icon svg {
      width: 100px;
      height: 100px;
      opacity: 0.3;
    }

    .placeholder-icon p {
      font-size: 14px;
      color: #aaa;
      margin: 0;
    }

    /* ── Dropdowns ── */
    .dropdowns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .dropdown-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dropdown-group label {
      font-size: 14px;
      font-weight: bold;
    }

    .dropdown-group select {
      height: 42px;
      border: 2px solid black;
      padding: 0 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      background-color: white;
      cursor: pointer;
    }

    .dropdown-group select:focus {
      outline: none;
      background-color: #ffffc0;
    }

    /* ── Summary ── */
    .summary {
      border: 2px solid black;
      padding: 20px 24px;
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .summary-details {
      display: flex;
      gap: 40px;
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .summary-item span:first-child {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
    }

    .summary-item span:last-child {
      font-size: 16px;
      font-weight: bold;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 16px;
    }

    .btn-primary {
      display: inline-block;
      background-color: #ffff00;
      color: black;
      padding: 12px 32px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      border: 2px solid black;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .btn-primary:hover {
      background-color: black;
      color: #ffff00;
    }

    .btn-secondary {
      display: inline-block;
      background-color: white;
      color: black;
      padding: 12px 32px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      border: 2px solid black;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .btn-secondary:hover {
      background-color: #f5f5f5;
    }

    /* ── Footer ── */
    footer {
      height: 50px;
      border: 2px solid black;
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 15px;
      font-weight: bold;
    }

    .social-links {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .social-links img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="nav-arrows">
        <button onclick="history.back()">&#8592;</button>
        <button onclick="history.forward()">&#8594;</button>
      </div>
      <div class="header-title">Drive Space</div>
    </div>
    <div class="logo">
      <img src="logo.jpg" alt="Drive Space Logo">
    </div>
  </header>

  <!-- Nav -->
  <nav>
    <a href="index.html">Home</a>
    <a href="carpage.html">Cars</a>
    <a href="contact.html">Contact</a>
    <a href="config-page.html">Car Configuration</a>
     <a href="comparison.html">Car Comparison</a>
  </nav>

  <!-- Page heading -->
  <div class="page-heading">
    <h1>Build Your Car</h1>
    <p>Choose your options below to configure your perfect Drive Space car.</p>
  </div>

  <!-- Configurator -->
  <section class="configurator-section">

    <!-- Car selector -->
    <div class="car-selector">
      <label for="carModel">Select a Car:</label>
      <select id="carModel" onchange="updatePreview()">
        <option value="" disabled selected>Choose a model</option>
        <option value="ds-aero-one">DS Aero One</option>
        <option value="terra-x5">Terra X5</option>
        <option value="velox-rs">Velox RS</option>
        <option value="luma-ev">Luma EV+</option>
        <option value="crest-s">Crest S</option>
        <option value="apex-gt">Apex GT</option>
      </select>
    </div>

    <!-- Car preview -->
    <div class="car-preview" id="carPreview">
      <span class="preview-label" id="previewLabel" style="display:none;"></span>
      <div class="placeholder-icon" id="placeholderIcon">
        <svg viewBox="0 0 64 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 22L14 10h36l6 12" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="4" y="22" width="56" height="6" rx="3" fill="#333"/>
          <circle cx="16" cy="30" r="3" fill="#333"/>
          <circle cx="48" cy="30" r="3" fill="#333"/>
        </svg>
        <p>Select a car model above to preview</p>
      </div>
      <img id="previewImg" src="" alt="Car Preview" style="display:none; width:100%; height:100%; object-fit:cover;">
    </div>

    <!-- Dropdowns -->
    <div class="dropdowns">
      <div class="dropdown-group">
        <label for="colour">Colour</label>
        <select id="colour" onchange="updateSummary()">
          <option value="" disabled selected>Select</option>
          <option value="Midnight Black">Midnight Black</option>
          <option value="Pearl White">Pearl White</option>
          <option value="Racing Red">Racing Red</option>
          <option value="Storm Grey">Storm Grey</option>
          <option value="Ocean Blue">Ocean Blue</option>
          <option value="Champagne Gold">Champagne Gold</option>
        </select>
      </div>

      <div class="dropdown-group">
        <label for="transmission">Transmission</label>
        <select id="transmission" onchange="updateSummary()">
          <option value="" disabled selected>Select</option>
          <option value="Automatic">Automatic</option>
          <option value="Manual">Manual</option>
          <option value="Semi-Automatic">Semi-Automatic</option>
        </select>
      </div>

      <div class="dropdown-group">
        <label for="tyres">Tyres</label>
        <select id="tyres" onchange="updateSummary()">
          <option value="" disabled selected>Select</option>
          <option value="Standard 18">Standard 18"</option>
          <option value="Sport 19">Sport 19"</option>
          <option value="Performance 20">Performance 20"</option>
          <option value="Off-Road 21">Off-Road 21"</option>
        </select>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary">
      <div class="summary-details">
        <div class="summary-item">
          <span>Model</span>
          <span id="sumModel">—</span>
        </div>
        <div class="summary-item">
          <span>Colour</span>
          <span id="sumColour">—</span>
        </div>
        <div class="summary-item">
          <span>Transmission</span>
          <span id="sumTransmission">—</span>
        </div>
        <div class="summary-item">
          <span>Tyres</span>
          <span id="sumTyres">—</span>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="actions">
      <a href="booking-page-Ds.html" class="btn-primary">Book Test Drive</a>
      <button class="btn-secondary" onclick="resetConfig()">Reset</button>
    </div>

  </section>

  <!-- Footer -->
  <footer>
    <span>Copyright © Drive Space 2026</span>
    <div class="social-links">
      <a href="#"><img src="Instalogo.jpg" alt="Instagram"></a>
      <a href="#"><img src="Xlogo.png" alt="X"></a>
      <a href="#"><img src="Facebook.png" alt="Facebook"></a>
      <a href="#"><img src="TikTok.png" alt="TikTok"></a>
    </div>
  </footer>

  <script>
    const carNames = {
      'ds-aero-one': 'Ds Aero One',
      'terra-x5':    'Terra X5',
      'velox-rs':    'Velox RS',
      'luma-ev':     'Luma EV+',
      'crest-s':     'Crest S',
      'apex-gt':     'Apex GT'
    };

   
    const carImages = {
      'ds-aero-one': 'ds-aero-sport-.jpg',
      'terra-x5':    'Terra.jpg',
      'velox-rs':    'VeloxRS.jpg',
      'luma-ev':     'LumaEV.jpg',
      'crest-s':     'CrestS.jpg',
      'apex-gt':     'ApexGT.jpg'
    };

    function updatePreview() {
      const val         = document.getElementById('carModel').value;
      const img         = document.getElementById('previewImg');
      const placeholder = document.getElementById('placeholderIcon');
      const label       = document.getElementById('previewLabel');

      label.textContent  = carNames[val] || '';
      label.style.display = val ? 'block' : 'none';

      const src = carImages[val];
      if (src) {
        img.src = src;
        img.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        img.style.display = 'none';
        placeholder.style.display = 'flex';
      }

      updateSummary();
    }

    function updateSummary() {
      const model        = document.getElementById('carModel').value;
      const colour       = document.getElementById('colour').value;
      const transmission = document.getElementById('transmission').value;
      const tyres        = document.getElementById('tyres').value;

      document.getElementById('sumModel').textContent        = carNames[model] || '—';
      document.getElementById('sumColour').textContent       = colour || '—';
      document.getElementById('sumTransmission').textContent = transmission || '—';
      document.getElementById('sumTyres').textContent        = tyres || '—';
    }

    function resetConfig() {
      document.getElementById('carModel').selectedIndex      = 0;
      document.getElementById('colour').selectedIndex        = 0;
      document.getElementById('transmission').selectedIndex  = 0;
      document.getElementById('tyres').selectedIndex         = 0;
      document.getElementById('previewImg').style.display    = 'none';
      document.getElementById('placeholderIcon').style.display = 'flex';
      document.getElementById('previewLabel').style.display  = 'none';
      updateSummary();
    }
  </script>

</body>
</html>
