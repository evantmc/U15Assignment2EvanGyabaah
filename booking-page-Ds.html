<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Space — Book a Test Drive</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
    }

    /* ── Header ── */
    header {
      display: grid;
      grid-template-columns: 1fr 200px;
      height: 70px;
      border: 2px solid black;
    }

    .header-left {
  display: flex;
  align-items: center;
  gap: 20px;
  padding-left: 16px;
}

.header-title {
  display: flex;
  align-items: center;
  font-size: 42px;
  font-weight: bold;
}

.nav-arrows {
  display: flex;
  gap: 6px;
}

.nav-arrows button {
  width: 32px;
  height: 32px;
  background-color: white;
  border: 2px solid black;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.nav-arrows button:hover {
  background-color: #ffff00;
}

    .logo {
      background-color: #8c8c8c;
      border-left: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Nav ── */
    nav {
      height: 80px;
      border-left: 2px solid black;
      border-right: 2px solid black;
      border-bottom: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      font-size: 24px;
      font-weight: bold;
      background-color: white;
    }

    nav a {
      color: black;
      text-decoration: none;
    }

    nav a:hover {
  color: black;
  background-color: #ffff00;
  padding: 6px 16px;

    }

    nav a.active {
      background-color: #ffff00;
      color: black;
      padding: 4px 14px;
      border: 2px solid black;
    }

    /* ── Booking section ── */
    .booking-section {
      border-left: 2px solid black;
      border-right: 2px solid black;
      border-bottom: 2px solid black;
      padding: 40px;
      min-height: 500px;
    }

    .booking-section h1 {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin: 0 0 36px 0;
    }

    /* ── Form ── */
    .booking-form {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 18px;
    }

    .form-group label {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      height: 38px;
      border: 1px solid #aaa;
      padding: 0 10px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #555;
      background-color: white;
      outline: none;
      width: 100%;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: black;
    }

    .form-group input::placeholder {
      color: #aaa;
    }

    /* ── Bottom row: dropdown + submit ── */
    .form-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-top: 4px;
    }

    .form-bottom .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .form-bottom select {
      width: 100%;
    }

    .submit-btn {
      height: 38px;
      padding: 0 30px;
      background-color: #ffff00;
      color: black;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: bold;
      border: 2px solid black;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .submit-btn:hover {
      background-color: black;
      color: #ffff00;
    }

    /* ── Footer ── */
    footer {
      height: 50px;
      border: 2px solid black;
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <script>
  function submitBooking() {
    const name = document.getElementById('fullname').value;
    if (name) {
      window.location.href = 'Response.html?name=' + encodeURIComponent(name);
    } else {
      alert('Please fill in your full name before submitting.');
    }
  }
</script>
</body>

  <!-- Header -->
  <header>
  <div class="header-left">
    <div class="nav-arrows">
      <button onclick="history.back()">&#8592;</button>
      <button onclick="history.forward()">&#8594;</button>
    </div>
    <div class="header-title">Drive Space</div>
  </div>
  <div class="logo">
    <img src="logo.jpg" alt="Drive Space Logo">
  </div>
</header>
  <!-- Nav -->
  <nav>
    <a href="index.html">Home</a>
    <a href="carpage.html">Cars</a>
    <a href="contact.html">Contact</a>
    <a href="config-page.html">Car Configuration</a>
     <a href="comparison.html">Car Comparison</a>
  </nav>

  <!-- Booking form -->
  <section class="booking-section">
    <h1>Test Drive Today</h1>

    <div class="booking-form">

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Type here">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Type here">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Type here">
      </div>

      <div class="form-group">
        <label for="address">House Address</label>
        <input type="text" id="address" name="address" placeholder="Type here">
      </div>

      <!-- Car model + Submit on same row -->
      <div class="form-bottom">
        <div class="form-group">
          <label for="carmodel">Car Model</label>
          <select id="carmodel" name="carmodel">
            <option value="" disabled selected>Select</option>
            <option value="ds-aero-one">DS Aero One</option>
            <option value="terra-x5">Terra X5</option>
            <option value="velox-rs">Velox RS</option>
            <option value="luma-ev">Luma EV+</option>
            <option value="crest-s">Crest S</option>
            <option value="apex-gt">Apex GT</option>
          </select>
        </div>

        <a href="Response.html" class="submit-btn">Submit</a>
      </div>

    </div>
  </section>

  <!-- Footer -->
<footer>
  Copyright © Drive Space 2026
</footer>
</body>
</html>
